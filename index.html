<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RSQUARE Login</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #16a34a;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>RSQUARE Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwfs3zcJYpRATgl8RAjgmDS13eV2ztt2EtGxJUT2nLC0w07pjxuGJKji1BJJ5InkJBTsQ/exec";

function login() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } else {
      alert("Login gagal");
    }
  });
}
</script>

</body>
</html>
